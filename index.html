<html lang="en">
<head>

  <title>Tamil Kidszona | Links</title>
  <meta content="Tamil Kidszona - Official Social Links" name="description"></meta>

  <style>
    :root{
      --bg:#000;
      --white:#fff;
      --muted: rgba(255,255,255,.72);
      --ring: 4px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(circle at top, #0f0f0f 0%, var(--bg) 65%);
      color: var(--white);
      min-height:100vh;
      display:flex;
      justify-content:center;
      padding: 26px 14px 40px;
    }

    .wrap{width:min(980px,100%); text-align:center;}

    /* Top big circle logo */
.brand{
  width: 240px;
  height: 240px;
  margin: 14px auto 46px;
  border-radius: 999px;
  border: 4px solid #ffffff;   /* FORCE WHITE */
  background: rgba(255,255,255,.02);
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}
    .brand img{
      width:100%;
      height:100%;
      object-fit: contain;
    }
    .brandFallback{
      font-weight: 900;
      font-size: 34px;
      line-height: 1;
      letter-spacing: .5px;
      text-transform: uppercase;
    }
    .brandFallback small{
      display:block;
      font-size: 16px;
      margin-top: 10px;
      letter-spacing: 1px;
      opacity: .9;
    }

    /* 3 icons per row ALWAYS */
    .grid{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 34px;
      justify-items:center;
      align-items:start;
      padding: 0;
    }

    .tile{
      width: min(230px, 100%);
      text-decoration:none;
      color: var(--white);
      display:block;
      border-radius: 18px;
      padding: 10px 8px;
      transition: transform .15s ease, background .15s ease;
      cursor:pointer;
    }
    .tile:hover{
      transform: translateY(-2px);
      background: rgba(255,255,255,.04);
    }

    .circle{
  width: 150px;
  height: 150px;
  margin: 0 auto;
  border-radius: 999px;
  border: 4px solid #ffffff !important;   /* FORCE WHITE */
  background: #000;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  font-size: 40px;
}
    .circle img{
      width:100%;
      height:100%;
      object-fit: cover;
      display:block;
    }

    .label{
      margin-top: 12px;
      font-weight: 900;
      letter-spacing: .7px;
      font-size: 14px;
      text-transform: uppercase;
    }

    .footer{
      margin-top: 28px;
      font-size: 12px;
      color: rgba(255,255,255,.55);
    }

    /* Make circles smaller on mobile */
    @media (max-width: 520px){
      .brand{ width: 190px; height: 190px; margin-bottom: 28px; }
      .circle{ width: 120px; height: 120px; }
      .grid{ gap: 18px; }
      .label{ font-size: 12px; }
    }

    /* Center last row if only 1 item */
    .tile.centerOnly{
      grid-column: 2 / 3; /* put in middle column */
    }
  </style>
</head>
