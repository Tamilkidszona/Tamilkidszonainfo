  <style>
    /* 1. DISABLE ZOOM & BASIC SETUP */
    html, body {
      touch-action: pan-x pan-y;
      overflow-x: hidden;
    }
    body {
      margin: 0;
      padding: 20px 10px;
      font-family: system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at top, #0f0f0f 0%, #000000 65%);
      color: #ffffff !important;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .wrap {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* --- ANIMATION KEYFRAMES (The "Video" Glow Effect) --- */
    @keyframes videoGlow {
      0% {
        filter: drop-shadow(0 0 2px rgba(255, 255, 255, 0.3));
      }
      50% {
        filter: drop-shadow(0 0 25px rgba(255, 255, 255, 1.0)); /* Brightest point */
      }
      100% {
        filter: drop-shadow(0 0 2px rgba(255, 255, 255, 0.3));
      }
    }

    /* --- LOGO --- */
    .brand {
      width: 160px;
      height: auto;
      border: none !important;
      border-radius: 0;
      background: transparent;
      
      /* ONE LINE GAP SETTING */
      margin-bottom: 15px; 
      
      display: flex;
      justify-content: center;
      align-items: center;

      /* APPLY THE ANIMATION HERE */
      animation: videoGlow 2s infinite ease-in-out;
    }
    .brand img {
      width: 100%;
      height: auto;
      object-fit: contain;
    }

    /* --- WELCOME TEXT --- */
    .welcome-text {
      color: #ffffff !important;
      text-align: center;
      font-size: 13px;
      line-height: 1.5;
      font-weight: 800;          /* Extra Bold */
      text-transform: uppercase; /* All Caps */
      letter-spacing: 1px;
      
      margin-top: 0;            /* No extra space above */
      margin-bottom: 40px;
      max-width: 90%;
      opacity: 0.95;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
    }

    /* GRID SYSTEM */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      width: 100%;
      justify-items: center;
    }

    /* LINKS & TILES */
    a.tile {
      text-decoration: none !important;
      color: #ffffff !important;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      -webkit-tap-highlight-color: transparent;
    }

    /* CIRCLE ICONS */
    .circle {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 3px solid #ffffff !important;
      overflow: hidden;
      margin-bottom: 10px;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #ffffff !important;
    }
    .circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .label {
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      text-align: center;
      letter-spacing: 0.5px;
      color: #ffffff !important;
    }

    .footer {
      margin-top: 40px;
      font-size: 12px;
      color: #888;
      text-align: center;
    }

    /* Center the last item */
    .tile:last-child {
       grid-column: 2; 
    }

  </style>
