<!DOCTYPE html>

<head>

  <!-- Best possible zoom control (pinch may still work on some Android) -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />

  <title>Tamil Kidszona | Links</title>

  <style>
    :root{
      --bg:#000;
      --white:#fff;
      --muted: rgba(255,255,255,.72);
      --ring: 4px;
    }

    *{ box-sizing:border-box; }

    html, body{
      width:100%;
      overflow-x:hidden;           /* ✅ no right-side cut */
      touch-action: manipulation;  /* ✅ reduces double-tap zoom */
    }

    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(circle at top, #0f0f0f 0%, var(--bg) 65%);
      color: var(--white);
      min-height:100vh;
      display:flex;
      justify-content:center;
      padding: 14px 12px 40px;
    }

    .wrap{
      width:min(980px,100%);
      text-align:center;
      padding-top: 310px; /* ✅ space for fixed logo */
    }

    /* ✅ Logo fixed TOP CENTER (always) */
    .brand{
      width: 240px;
      height: 240px;

      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);

      z-index: 9999;
      margin: 0;

      border-radius: 999px;
      border: 4px solid #ffffff;
      background: rgba(255,255,255,.02);

      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }

    .brand img{
      width:100%;
      height:100%;
      object-fit: contain;
      display:block;
    }

    .brandFallback{
      font-weight: 900;
      font-size: 34px;
      line-height: 1;
      letter-spacing: .5px;
      text-transform: uppercase;
    }
    .brandFallback small{
      display:block;
      font-size: 16px;
      margin-top: 10px;
      letter-spacing: 1px;
      opacity: .9;
    }

    /* ✅ 3 icons per row + prevent overflow on mobile */
    .grid{
      display:grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 24px;
      justify-items:center;
      align-items:start;
      padding: 0;
    }

    .tile{
      width: 100%;
      max-width: 230px;
      text-decoration:none;
      color: var(--white);
      display:block;
      border-radius: 18px;
      padding: 10px 8px;
      transition: transform .15s ease, background .15s ease;
      cursor:pointer;
    }

    /* Hover only helps desktop; on mobile it can feel weird */
    @media (hover:hover){
      .tile:hover{
        transform: translateY(-2px);
        background: rgba(255,255,255,.04);
      }
    }

    .circle{
      width: 150px;
      height: 150px;
      margin: 0 auto;
      border-radius: 999px;
      border: 4px solid #ffffff !important;
      background: #000;
      overflow: hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight: 900;
      font-size: 40px;
    }

    .circle img{
      width:100%;
      height:100%;
      object-fit: cover;
      display:block;
    }

    .label{
      margin-top: 12px;
      font-weight: 900;
      letter-spacing: .7px;
      font-size: 14px;
      text-transform: uppercase;
      line-height: 1.2;
    }

    .footer{
      margin-top: 28px;
      font-size: 12px;
      color: rgba(255,255,255,.55);
    }

    /* ✅ MOBILE: make everything smaller so full page fits (no “zoomed in”) */
    @media (max-width: 520px){
      body{ padding: 12px 10px 30px; }

      .brand{
        width: 170px;
        height: 170px;
        top: 10px;
        border-width: 4px;
      }

      .wrap{ padding-top: 230px; }

      .grid{ gap: 14px; }

      .circle{
        width: 92px;
        height: 92px;
        border-width: 3px !important;
      }

      .tile{
        padding: 6px 2px;
        max-width: none;
      }

      .label{
        font-size: 11px;
        letter-spacing: .4px;
      }
    }

    /* Center last row if only 1 item */
    .tile.centerOnly{
      grid-column: 2 / 3;
    }
  </style>
</head>

  <script>
    document.getElementById("y").textContent = new Date().getFullYear();

    // prevent Ctrl + wheel zoom on desktop
    window.addEventListener('wheel', function(e){
      if (e.ctrlKey) e.preventDefault();
    }, { passive: false });

    // prevent keyboard zoom shortcuts
    window.addEventListener('keydown', function(e){
      if ((e.ctrlKey || e.metaKey) && ['+','-','=','0'].includes(e.key)) {
        e.preventDefault();
      }
    });
  </script>
