  <style>
    /* 1. DISABLE ZOOM & BASIC SETUP */
    html, body {
      touch-action: pan-x pan-y;
      overflow-x: hidden;
    }
    body {
      margin: 0;
      padding: 20px 10px;
      font-family: system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at top, #0f0f0f 0%, #000000 65%);
      color: #ffffff !important;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .wrap {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* --- ANIMATION KEYFRAMES (Logo Glow) --- */
    @keyframes videoGlow {
      0%, 100% { filter: drop-shadow(0 0 2px rgba(255, 255, 255, 0.3)); }
      50% { filter: drop-shadow(0 0 25px rgba(255, 255, 255, 1.0)); }
    }

    /* --- STAR TWINKLE ANIMATION --- */
    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.3) rotate(0deg); }
      50% { opacity: 1; transform: scale(1.1) rotate(15deg); }
    }

    /* --- LOGO CONTAINER --- */
    .brand {
      width: 160px;
      height: auto;
      position: relative; /* Anchor for stars */
      margin-bottom: 25px; 
      display: flex;
      justify-content: center;
      align-items: center;
      animation: videoGlow 2s infinite ease-in-out;
    }

    .brand img {
      width: 100%;
      height: auto;
      object-fit: contain;
      z-index: 2;
    }

    /* --- STAR ELEMENTS --- */
    .star {
      position: absolute;
      background: #fff;
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
      z-index: 1;
      animation: twinkle 2.5s infinite ease-in-out;
    }

    /* Individual Star Positions & Timings */
    .s1 { width: 14px; height: 14px; top: -10px; left: 10%; animation-delay: 0s; }
    .s2 { width: 18px; height: 18px; top: 20%; right: -15px; animation-delay: 0.5s; }
    .s3 { width: 12px; height: 12px; bottom: 15%; left: -10px; animation-delay: 1.2s; }
    .s4 { width: 16px; height: 16px; bottom: -10px; right: 10%; animation-delay: 0.8s; }
    .s5 { width: 10px; height: 10px; top: 40%; left: -20px; animation-delay: 1.5s; background: #FFD700; } /* Golden Star */

    /* --- WELCOME TEXT --- */
    .welcome-text {
      color: #ffffff !important;
      text-align: center;
      font-size: 13px;
      line-height: 1.5;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 40px;
      max-width: 90%;
      opacity: 0.95;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
    }

    /* GRID SYSTEM */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      width: 100%;
      justify-items: center;
    }

    /* LINKS & TILES */
    a.tile {
      text-decoration: none !important;
      color: #ffffff !important;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.2s;
    }
    
    a.tile:active { transform: scale(0.95); }

    /* CIRCLE ICONS */
    .circle {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 3px solid #ffffff !important;
      overflow: hidden;
      margin-bottom: 10px;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .label {
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      text-align: center;
      letter-spacing: 0.5px;
      color: #ffffff !important;
    }

    .footer {
      margin-top: 40px;
      font-size: 12px;
      color: #888;
      text-align: center;
      padding-bottom: 20px;
    }

    /* Grid Layout Adjustments */
    .tile:nth-child(10) {
      grid-column: 2; 
    }

  </style>
</head>
