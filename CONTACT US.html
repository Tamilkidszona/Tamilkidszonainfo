<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Contact Us | Snow Effect</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    html, body {
      touch-action: pan-x pan-y; overflow-x: hidden; height: 100%; 
    }
    body {
      margin: 0; padding: 20px 10px;
      font-family: system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at top, #1a1a2e 0%, #000000 100%); 
      color: #ffffff !important;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; position: relative;
    }

    /* --- CREATOR / OWNER BUTTON --- */
    .creator-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      padding: 8px 16px;
      font-size: 11px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.7) !important;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 1px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 30px; /* Pill shape */
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(5px);
      transition: all 0.3s ease;
      z-index: 20; /* Keeps it above the snow */
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .creator-btn:hover {
      color: #ffffff !important;
      border-color: rgba(255, 255, 255, 0.5);
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
    }

    /* --- SNOW FALLING ANIMATION --- */
    .snow {
      position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
      pointer-events: none; z-index: 0;
      background-image: 
        radial-gradient(4px 4px at 20% 30%, rgba(255,255,255,0.8), transparent),
        radial-gradient(3px 3px at 40% 70%, rgba(255,255,255,0.7), transparent),
        radial-gradient(5px 5px at 70% 20%, rgba(255,255,255,0.6), transparent),
        radial-gradient(4px 4px at 90% 80%, rgba(255,255,255,0.9), transparent),
        radial-gradient(2px 2px at 10% 90%, rgba(255,255,255,0.5), transparent),
        radial-gradient(3px 3px at 50% 50%, rgba(255,255,255,0.8), transparent);
      background-size: 200vw 200vh; 
      animation: snowFall 20s linear infinite;
    }
    
    @keyframes snowFall {
      0% { background-position: 0px 0px; }
      100% { background-position: 500px 1000px; } 
    }

    /* CONTENT WRAPPER */
    .wrap {
      width: 100%; max-width: 600px;
      display: flex; flex-direction: column; align-items: center;
      z-index: 10; 
    }

    .title-box { text-align: center; margin-bottom: 50px; }
    .title-box h1 {
      font-size: 32px; font-weight: 900; text-transform: uppercase;
      letter-spacing: 2px; margin: 0 0 10px 0; text-shadow: 0 2px 4px rgba(0,0,0,0.8);
    }
    .title-box p { font-size: 15px; color: #cccccc !important; margin: 0; }

    .contact-container { display: flex; justify-content: center; width: 100%; }

    a.tile {
      text-decoration: none !important; color: #ffffff !important;
      display: flex; flex-direction: column; align-items: center; width: 130px;
    }

    .circle {
      width: 110px; height: 110px; border-radius: 50%;
      border: 4px solid #ffffff !important; margin-bottom: 15px;
      background: #000; display: flex; justify-content: center; align-items: center;
      font-size: 45px; transition: all 0.2s ease;
    }
    
    .tile:hover .circle {
      background: rgba(255, 255, 255, 0.1); transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.6);
    }

    .label { font-size: 13px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
    .footer { position: absolute; bottom: 20px; font-size: 12px; color: #666; width: 100%; text-align: center; }
  </style>
</head>

<body>
  <div class="snow"></div>

  <a href="https://tamilkidszona.github.io/Tamilkidszonainfo/ME.html" class="creator-btn">
    <i class="fa-solid fa-user-astronaut"></i> Creator
  </a>

  <div class="wrap">
    <div class="title-box">
      <h1>Contact Us</h1>
      <p>Get in touch directly via Telegram</p>
    </div>

    <div class="contact-container">
      <a class="tile" href="https://t.me/your_telegram_username" target="_blank">
        <div class="circle"><i class="fa-brands fa-telegram"></i></div>
        <div class="label">Telegram</div>
      </a>
    </div>
  </div>

  <div class="footer">© 2026 UX/UI Portfolio</div>
</body>
</html>
